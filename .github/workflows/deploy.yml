name: Build and Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: grossherzogvi/actual-budget

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          download-translations: 'false'

      - name: Build server
        run: yarn build:server

      - name: Build Level-5 web
        run: yarn workspace @finance-os/web build
        env:
          VITE_SURREALDB_URL: ${{ secrets.VITE_SURREALDB_URL }}

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push alpine image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: packages/sync-server/docker/alpine.Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            infra
            schema

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 212.69.84.228
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: 'infra/docker-compose.prod.yml,schema/*.surql'
          target: /opt/finance-os
          strip_components: 0

      - name: Deploy to VPS
        uses: appleboy/ssh-action@2ead5e36573f08b82fbfce1504f1a4b05a647c6f # v1.2.2
        with:
          host: 212.69.84.228
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/opt/finance-os

            # Create .env with SurrealDB credentials if it doesn't exist
            if [ ! -f "$DEPLOY_DIR/.env" ]; then
              printf 'SURREALDB_USER=%s\nSURREALDB_PASS=%s\n' '${{ secrets.SURREALDB_USER }}' '${{ secrets.SURREALDB_PASS }}' > "$DEPLOY_DIR/.env"
              chmod 600 "$DEPLOY_DIR/.env"
            fi

            # Pull and start services
            cd "$DEPLOY_DIR"
            docker compose --env-file .env -f infra/docker-compose.prod.yml pull
            docker compose --env-file .env -f infra/docker-compose.prod.yml up -d

            # Wait for SurrealDB to be healthy
            echo "Waiting for SurrealDB..."
            for i in $(seq 1 30); do
              if docker compose --env-file .env -f infra/docker-compose.prod.yml exec -T surrealdb surreal isready --conn http://localhost:8000 2>/dev/null; then
                echo "SurrealDB ready."
                break
              fi
              sleep 2
            done

            # Apply schema (idempotent)
            SURREAL_CONTAINER=$(docker compose --env-file .env -f infra/docker-compose.prod.yml ps -q surrealdb)
            docker cp schema/. "$SURREAL_CONTAINER":/tmp/schema/
            for f in schema/*.surql; do
              [ -f "$f" ] || continue
              echo "Applying $(basename "$f")..."
              docker exec "$SURREAL_CONTAINER" \
                surreal import \
                  --endpoint http://localhost:8000 \
                  --namespace finance \
                  --database main \
                  --username '${{ secrets.SURREALDB_USER }}' \
                  --password '${{ secrets.SURREALDB_PASS }}' \
                  "/tmp/schema/$(basename "$f")"
            done

            # Clean up old images
            docker image prune -f
