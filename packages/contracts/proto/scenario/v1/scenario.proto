syntax = "proto3";

package financeos.scenario.v1;

import "common/v1/envelope.proto";

service ScenarioService {
  rpc CreateBranch(CreateBranchRequest) returns (CreateBranchResponse);
  rpc ApplyMutation(ApplyMutationRequest) returns (ApplyMutationResponse);
  rpc CompareOutcomes(CompareOutcomesRequest) returns (CompareOutcomesResponse);
  rpc AdoptionCheck(AdoptionCheckRequest) returns (AdoptionCheckResponse);
  rpc ListMutations(ListMutationsRequest) returns (ListMutationsResponse);
  rpc GetLineage(GetLineageRequest) returns (GetLineageResponse);
  rpc AdoptBranch(AdoptBranchRequest) returns (AdoptBranchResponse);
}

message CreateBranchRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string name = 2;
  string base_branch_id = 3;
  string notes = 4;
}

message CreateBranchResponse {
  string branch_id = 1;
}

message ApplyMutationRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string branch_id = 2;
  string mutation_kind = 3;
  bytes payload = 4;
}

message ApplyMutationResponse {
  string mutation_id = 1;
}

message CompareOutcomesRequest {
  string branch_id = 1;
  string against_branch_id = 2;
}

message CompareOutcomesResponse {
  double amount_delta = 1;
  double risk_delta = 2;
}

message AdoptionCheckRequest {
  string branch_id = 1;
  string against_branch_id = 2;
}

message AdoptionCheckResponse {
  string branch_id = 1;
  string against_branch_id = 2;
  bool can_adopt = 3;
  int32 risk_score = 4;
  repeated string blockers = 5;
  repeated string warnings = 6;
  string summary = 7;
  double amount_delta = 8;
  double risk_delta = 9;
  int32 mutation_count = 10;
  int32 lineage_depth = 11;
  int64 checked_at_ms = 12;
}

message ListMutationsRequest {
  string branch_id = 1;
}

message ListMutationsResponse {
  repeated ScenarioMutation mutations = 1;
}

message GetLineageRequest {
  string branch_id = 1;
}

message GetLineageResponse {
  string branch_id = 1;
  repeated ScenarioLineageNode nodes = 2;
  bool has_cycle = 3;
}

message ScenarioMutation {
  string mutation_id = 1;
  string branch_id = 2;
  string mutation_kind = 3;
  bytes payload = 4;
  int64 created_at_ms = 5;
}

message ScenarioLineageNode {
  string branch_id = 1;
  string name = 2;
  string status = 3;
  int64 adopted_at_ms = 4;
}

message AdoptBranchRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string branch_id = 2;
  bool force = 3;
  string against_branch_id = 4;
}

message AdoptBranchResponse {
  string branch_id = 1;
  int64 adopted_at_ms = 2;
}
