syntax = "proto3";

package financeos.delegate.v1;

import "common/v1/envelope.proto";

service DelegateService {
  rpc ListLanes(ListLanesRequest) returns (ListLanesResponse);
  rpc ListLaneEvents(ListLaneEventsRequest) returns (ListLaneEventsResponse);
  rpc AssignLane(AssignLaneRequest) returns (AssignLaneResponse);
  rpc AcceptLane(AcceptLaneRequest) returns (AcceptLaneResponse);
  rpc CompleteLane(CompleteLaneRequest) returns (CompleteLaneResponse);
  rpc RejectLane(RejectLaneRequest) returns (RejectLaneResponse);
  rpc ReopenLane(ReopenLaneRequest) returns (ReopenLaneResponse);
  rpc CommentLane(CommentLaneRequest) returns (CommentLaneResponse);
}

message ListLanesRequest {
  int32 limit = 1;
  string status = 2;
  string assignee = 3;
  string assigned_by = 4;
  string priority = 5;
}

message ListLanesResponse {
  repeated Lane lanes = 1;
}

message ListLaneEventsRequest {
  string lane_id = 1;
  int32 limit = 2;
}

message ListLaneEventsResponse {
  repeated LaneEvent events = 1;
}

message AssignLaneRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string title = 2;
  string assignee = 3;
  bytes payload = 4;
  string priority = 5;
  int64 due_at_ms = 6;
}

message AssignLaneResponse {
  string lane_id = 1;
  string status = 2;
}

message AcceptLaneRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string lane_id = 2;
}

message AcceptLaneResponse {
  string lane_id = 1;
  string status = 2;
}

message CompleteLaneRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string lane_id = 2;
}

message CompleteLaneResponse {
  string lane_id = 1;
  string status = 2;
}

message RejectLaneRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string lane_id = 2;
  string reason = 3;
}

message RejectLaneResponse {
  string lane_id = 1;
  string status = 2;
}

message ReopenLaneRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string lane_id = 2;
  string reason = 3;
}

message ReopenLaneResponse {
  string lane_id = 1;
  string status = 2;
}

message CommentLaneRequest {
  financeos.common.v1.CommandEnvelope envelope = 1;
  string lane_id = 2;
  string message = 3;
  bytes payload = 4;
}

message CommentLaneResponse {
  string lane_id = 1;
  string event_id = 2;
}

message Lane {
  string lane_id = 1;
  string title = 2;
  string status = 3;
  string priority = 4;
  string assignee = 5;
  string assigned_by = 6;
  bytes payload = 7;
  int64 created_at_ms = 8;
  int64 updated_at_ms = 9;
  int64 due_at_ms = 10;
  int64 accepted_at_ms = 11;
  int64 completed_at_ms = 12;
  int64 rejected_at_ms = 13;
}

message LaneEvent {
  string event_id = 1;
  string lane_id = 2;
  string event_type = 3;
  string actor_id = 4;
  string message = 5;
  bytes payload = 6;
  int64 created_at_ms = 7;
}
