syntax = "proto3";

package financeos.common.v1;

message ConfidenceContext {
  double score = 1;
  string rationale = 2;
}

message CommandEnvelope {
  string command_id = 1;
  string actor_id = 2;
  string tenant_id = 3;
  string workspace_id = 4;
  string intent = 5;
  string workflow_id = 6;
  string source_surface = 7;
  ConfidenceContext confidence_context = 8;
  int32 latency_budget_ms = 9;
  int64 client_timestamp_ms = 10;
}
